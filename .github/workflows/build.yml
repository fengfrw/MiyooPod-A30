name: Build MiyooPod for Miyoo A30

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout MiyooPod-A30
        uses: actions/checkout@v4

      - name: Get latest upstream commit
        id: upstream
        run: |
          COMMIT=$(curl -s https://api.github.com/repos/danfragoso/miyoopod/commits/main | jq -r .sha)
          SHORT=${COMMIT:0:7}
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "short=$SHORT" >> $GITHUB_OUTPUT
          echo "Upstream commit: $SHORT"

      - name: Get last built commit
        id: last_built
        run: |
          LAST=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.body' | grep "upstream-commit:" | cut -d' ' -f2 || echo "none")
          if [ -z "$LAST" ] || [ "$LAST" = "null" ]; then LAST="none"; fi
          echo "commit=$LAST" >> $GITHUB_OUTPUT
          echo "Last built: $LAST"

      - name: Check if build needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.commit }}" = "${{ steps.last_built.outputs.commit }}" ]; then
            echo "needed=false" >> $GITHUB_OUTPUT
            echo "Already up to date"
          else
            echo "needed=true" >> $GITHUB_OUTPUT
            echo "New commit, building"
          fi

      - name: Set up Go
        if: steps.check.outputs.needed == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.2'

      - name: Clone upstream MiyooPod
        if: steps.check.outputs.needed == 'true'
        run: git clone --depth 1 https://github.com/danfragoso/miyoopod.git upstream

      - name: Get version string
        if: steps.check.outputs.needed == 'true'
        id: version
        run: |
          VER=$(cat version.json | grep -o '"version": *"[^"]*"' | grep -o '[0-9]*\.[0-9]*\.[0-9]*')
          if [ -z "$VER" ]; then VER="0.1.0"; fi
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Apply A30 patches
        if: steps.check.outputs.needed == 'true'
        run: |
          cd upstream
          patch -p1 < ../patches/logger.go.patch || echo 'logger patch failed (may be ok if overlay replaces it)'
          patch -p1 < ../patches/ui.go.patch || echo 'ui patch failed'
          patch -p1 < ../patches/power_mgmt.go.patch || echo 'power_mgmt patch failed'
          patch -p1 < ../patches/about.go.patch || echo 'about patch failed'
          cp ../overlay/src/*.go src/
          cp ../overlay/src/*.c src/
          # Copy bundled SDL_mixer to known path for cgo linking
          mkdir -p /tmp/sdl-libs
          cp ../libs/libSDL2_mixer*.so* /tmp/sdl-libs/
          echo 'cgo flags in main.go:'
          grep 'cgo' src/main.go | head -3
          cp ../overlay/App/MiyooPod/launch.sh App/MiyooPod/launch.sh
          chmod +x App/MiyooPod/launch.sh
          cp ../libs/libSDL2_mixer.so App/MiyooPod/libs/libSDL2_mixer.so
          cp ../libs/libSDL2_mixer-2.0.so.0 App/MiyooPod/libs/libSDL2_mixer-2.0.so.0
          echo "Patches applied"

      - name: Install cross-compiler and armhf SDL2
        if: steps.check.outputs.needed == 'true'
        run: sudo bash scripts/setup-armhf.sh

      - name: Set up CGO paths
        if: steps.check.outputs.needed == 'true'
        run: |
          # SDL2 installed via apt - verify headers and libs are present
          find /usr/include/arm-linux-gnueabihf/SDL2 -name "SDL_mixer.h" 2>/dev/null || find /usr/include -name "SDL_mixer.h" 2>/dev/null
          ls /usr/lib/arm-linux-gnueabihf/libSDL2* 2>/dev/null | head -5

      - name: Run build-inject
        if: steps.check.outputs.needed == 'true'
        run: cd upstream && go run scripts/build-inject.go || true

      - name: Build MiyooPod binary
        if: steps.check.outputs.needed == 'true'
        run: |
          cd upstream
          CGO_CFLAGS="-I/usr/include/arm-linux-gnueabihf" \
          CGO_LDFLAGS="-L/tmp/sdl-libs -L/usr/lib/arm-linux-gnueabihf -Wl,-rpath-link,/tmp/sdl-libs" \
          CC=arm-linux-gnueabihf-gcc \
          CGO_ENABLED=1 \
          GOARCH=arm \
          GOARM=7 \
          GOOS=linux \
          go build -a -o App/MiyooPod/MiyooPod src/*.go

      - name: Package release
        if: steps.check.outputs.needed == 'true'
        run: |
          cd upstream
          rm -f App/MiyooPod/miyoopod.log App/MiyooPod/config.json App/MiyooPod/.DS_Store
          zip -r ../MiyooPod-A30-v${{ steps.version.outputs.ver }}.zip App/MiyooPod/
          ls -lh ../MiyooPod-A30-v${{ steps.version.outputs.ver }}.zip

      - name: Create GitHub Release
        if: steps.check.outputs.needed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}-${{ steps.upstream.outputs.short }}
          name: MiyooPod v${{ steps.version.outputs.ver }} for Miyoo A30 (SpruceOS)
          body: |
            Automated A30 port of [MiyooPod](https://github.com/danfragoso/miyoopod) by danfragoso.

            upstream-commit: ${{ steps.upstream.outputs.commit }}

            ## Installation
            1. Extract zip to `/mnt/SDCARD/App/` on your Miyoo A30
            2. Launch MiyooPod from the PyUI menu

            ## Requirements
            - Miyoo A30 running SpruceOS v4.0.0+
          files: MiyooPod-A30-v${{ steps.version.outputs.ver }}.zip
