name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Inject PostHog token
        run: |
          echo "POSTHOG_TOKEN=${{ secrets.POSTHOG_TOKEN }}" > .env
          go run scripts/build-inject.go

      - name: Build Docker image
        run: docker build -f Dockerfile.build -t miyoopod-builder .

      - name: Build ARM binary
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/build \
            -w /build \
            -e CC=arm-linux-gnueabihf-gcc \
            -e CGO_ENABLED=1 \
            -e GOARCH=arm \
            -e GOARM=7 \
            -e GOOS=linux \
            -e CGO_CFLAGS="-I/usr/include/arm-linux-gnueabihf" \
            -e CGO_LDFLAGS="-L/build/App/MiyooPod/libs -Wl,-rpath-link,/build/App/MiyooPod/libs" \
            miyoopod-builder \
            go build -buildvcs=false -a -o App/MiyooPod/MiyooPod ./src/*.go

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Package release zip
        run: |
          cd App/MiyooPod
          zip -r ../../MiyooPod-${{ steps.version.outputs.VERSION }}.zip .

      - name: Update version.json
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          VERSION_NUM=${VERSION#v}
          ZIP="MiyooPod-${VERSION}.zip"
          CHECKSUM="sha256:$(sha256sum ${ZIP} | cut -d' ' -f1)"
          SIZE=$(stat -c%s ${ZIP})
          URL="https://github.com/amruthwo/MiyooPod-A30/releases/download/${VERSION}/${ZIP}"
          jq --arg version "$VERSION_NUM" \
             --arg checksum "$CHECKSUM" \
             --arg url "$URL" \
             --argjson size "$SIZE" \
             '.version=$version | .checksum=$checksum | .url=$url | .size=$size' \
             version.json > version.json.tmp
          mv version.json.tmp version.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "Update version.json for ${VERSION} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MiyooPod ${{ steps.version.outputs.VERSION }}
          files: MiyooPod-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
